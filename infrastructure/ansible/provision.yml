---
- name: Configure HackerTime privesc target
  hosts: all
  become: true

  tasks:
    # ---- Create appuser ----
    - name: Ensure appuser exists with password
      user:
        name: appuser
        groups: "sudo,docker"
        shell: /bin/bash
        password: "{{ 'wareh0use!' | password_hash('sha512') }}"

    # ---- Deploy flags ----
    - name: Create flag1 (SUID)
      copy:
        content: "HT{SUID_m4st3ry_t0ol}"
        dest: /root/flag1.txt
        owner: root
        group: root
        mode: "0600"

    - name: Create flag2 (Cron)
      copy:
        content: "HT{cr0n_1s_y0ur_fr13nd}"
        dest: /root/flag2.txt
        owner: root
        group: root
        mode: "0600"

    - name: Create flag3 (Sudo)
      copy:
        content: "HT{n4n0_g4n3r4l_p3t_3sc}"
        dest: /root/flag3.txt
        owner: root
        group: root
        mode: "0600"

    - name: Create flag4 (Permissions)
      copy:
        content: "HT{p4sswd_wn_b4d_id3a}"
        dest: /root/flag4.txt
        owner: root
        group: root
        mode: "0600"

    # ---- SUID binary (Flag 1) ----
    - name: Copy logviewer source
      copy:
        src: ../../files/vulnerable_apps/logviewer.c
        dest: /tmp/logviewer.c
        owner: root
        group: root
        mode: "0644"

    - name: Compile logviewer
      command: gcc /tmp/logviewer.c -o /usr/local/bin/logviewer

    - name: Set SUID bit on logviewer
      file:
        path: /usr/local/bin/logviewer
        owner: root
        group: root
        mode: "4755"

    - name: Remove source after compilation
      file:
        path: /tmp/logviewer.c
        state: absent

    # ---- Writable cron script (Flag 2) ----
    - name: Deploy writable report script
      copy:
        content: |
          #!/bin/bash
          echo "=== Warehouse Daily Report ===" > /var/tmp/report.txt
          date >> /var/tmp/report.txt
          df -h >> /var/tmp/report.txt
          uptime >> /var/tmp/report.txt
          echo "Report complete."
        dest: /opt/scripts/report.sh
        owner: root
        group: root
        mode: "0777"

    - name: Deploy root cron entry
      copy:
        content: "* * * * * root /opt/scripts/report.sh"
        dest: /etc/cron.d/report-gen
        owner: root
        group: root
        mode: "0644"

    # ---- Sudo misconfiguration (Flag 3) ----
    - name: Drop custom sudoers file
      copy:
        content: "appuser ALL=(ALL) NOPASSWD: /usr/bin/nano /etc/hosts"
        dest: /etc/sudoers.d/appuser-nano
        owner: root
        group: root
        mode: "0440"

    # ---- Weak file permissions (Flag 4) ----
    - name: Make /etc/passwd world-writable
      file:
        path: /etc/passwd
        mode: "0777"

    # ---- Hints directory ----
    - name: Create hints directory
      file:
        path: /opt/hints
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Deploy hint1 (SUID)
      copy:
        content: "Try running `find / -perm -4000 -type f 2>/dev/null`.  Do any of those binaries look unusual?"
        dest: /opt/hints/hint1.txt
        mode: "0644"

    - name: Deploy hint2 (Cron)
      copy:
        content: "Check /etc/cron.d and /var/spool/cron.  Are any of those scripts writable by you?"
        dest: /opt/hints/hint2.txt
        mode: "0644"

    - name: Deploy hint3 (Sudo + Permissions)
      copy:
        content: "Run `sudo -l`.  Also, what does `ls -la /etc/passwd` tell you?"
        dest: /opt/hints/hint3.txt
        mode: "0644"

    # ---- Offline cheat-sheet ----
    - name: Deploy GTFOBins nano reference
      copy:
        src: ../../files/vulnerable_apps/gtfobins_nano.html
        dest: /opt/tools/gtfobins_nano.html
        mode: "0644"

    # ---- SSH hardening (only allow passwords + keys, disable root SSH) ----
    - name: Ensure SSH allows password auth
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "^PasswordAuthentication"
        line: "PasswordAuthentication yes"
      notify: restart sshd

    - name: Ensure root SSH login is disabled
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "^PermitRootLogin"
        line: "PermitRootLogin no"
      notify: restart sshd

    # ---- Enable cron ----
    - name: Ensure cron is started and enabled
      service:
        name: cron
        state: started
        enabled: true

  handlers:
    - name: restart sshd
      service:
        name: ssh
        state: restarted

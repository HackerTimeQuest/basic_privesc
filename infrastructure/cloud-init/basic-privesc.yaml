#cloud-config

hostname: wackywarehouse
timezone: UTC

users:
  - name: appuser
    groups: [sudo, docker]
    shell: /bin/bash
    sudo: 'ALL=(ALL) NOPASSWD: /usr/bin/nano /etc/hosts'
    ssh-authorized-keys: []

package_update: true
packages:
  - openssh-server
  - cron
  - nano
  - curl
  - gcc
  - make
  - unzip
  - git
  - python3
  - lsof
  - net-tools
  - procps
  - ufw

write_files:
  # ---- Flag files ----
  - path: /root/flag1.txt
    owner: root:root
    permissions: '0600'
    content: |
      HT{SUID_m4st3ry_t0ol}

  - path: /root/flag2.txt
    owner: root:root
    permissions: '0600'
    content: |
      HT{cr0n_1s_y0ur_fr13nd}

  - path: /root/flag3.txt
    owner: root:root
    permissions: '0600'
    content: |
      HT{n4n0_g4n3r4l_p3t_3sc}

  - path: /root/flag4.txt
    owner: root:root
    permissions: '0600'
    content: |
      HT{p4sswd_wn_b4d_id3a}

  # ---- SUID binary source ----
  - path: /tmp/logviewer.c
    owner: root:root
    permissions: '0644'
    content: |
      #include <stdio.h>
      #include <stdlib.h>
      #include <string.h>

      int main(int argc, char *argv[]) {
          char cmd[512];

          if (argc < 2) {
              printf("Usage: %s <log_file>\n", argv[0]);
              exit(1);
          }

          printf("Viewing log file: %s\n", argv[1]);
          printf("---\n");

          /* VULNERABLE: unsanitized user input in system() */
          snprintf(cmd, sizeof(cmd), "/bin/cat %s", argv[1]);
          system(cmd);

          printf("---\nEnd of log.\n");
          return 0;
      }

  # ---- Writable cron script ----
  - path: /opt/scripts/report.sh
    owner: root:root
    permissions: '0777'
    content: |
      #!/bin/bash
      # Daily warehouse report
      echo "=== Warehouse Daily Report ===" > /var/tmp/report.txt
      date >> /var/tmp/report.txt
      df -h >> /var/tmp/report.txt
      uptime >> /var/tmp/report.txt
      echo "Report complete."

  # ---- Offline GTFOBins reference ----
  - path: /opt/tools/gtfobins_nano.html
    owner: root:root
    permissions: '0644'
    content: |
      <!DOCTYPE html><html><body>
      <h1>GTFOBins: nano</h1>
      <p>If nano is allowed via sudo press Ctrl+R then Ctrl+X inside nano and type /bin/sh</p>
      </body></html>

  # ---- Root cron entry ----
  - path: /etc/cron.d/report-gen
    owner: root:root
    permissions: '0644'
    content: |
      * * * * * root /opt/scripts/report.sh

  # ---- Hints ----
  - path: /opt/hints/hint1.txt
    owner: root:root
    permissions: '0644'
    content: |
      Try find / -perm -4000 -type f 2>/dev/null and look for unusual SUID binaries.

  - path: /opt/hints/hint2.txt
    owner: root:root
    permissions: '0644'
    content: |
      Check /etc/cron.d for scheduled tasks.  Are any of those scripts writable by you?

  - path: /opt/hints/hint3.txt
    owner: root:root
    permissions: '0644'
    content: |
      Try sudo -l and ls -la /etc/passwd.  Two very different escalation paths.

runcmd:
  - echo "appuser:wareh0use!" | chpasswd
  - chmod 777 /etc/passwd
  - gcc /tmp/logviewer.c -o /usr/local/bin/logviewer
  - chmod u+s /usr/local/bin/logviewer
  - rm -f /tmp/logviewer.c
  - service cron start
  - mkdir -p /root/.ssh
  - sed -i 's/^#PasswordAuthentication/PasswordAuthentication/' /etc/ssh/sshd_config
  - sed -i 's/^PermitRootLogin.*/PermitRootLogin no/' /etc/ssh/sshd_config
  - service ssh restart
  - "# Guest firewall (UFW) will be finalized by setup.sh to restrict creator's IP"
  - ufw --force enable
  - ufw default deny incoming
  - ufw default allow outgoing
  - ufw allow 22/tcp
  - rm -f /var/lib/cloud/instance/boot-finished
  - touch /opt/.lab-provisioned

ssh_pwauth: true
